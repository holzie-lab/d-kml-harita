<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KML Konum Haritası</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@tmcw/togeojson"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  overflow:hidden;
}

/* Sidebar */
#sidebar{
  position:fixed;
  left:-300px; /* gizli başlangıç */
  top:0;
  width:300px;
  height:100%;
  background:#f7f7f7;
  border-right:1px solid #ccc;
  overflow:auto;
  padding:10px;
  transition:0.3s;
  z-index:1000;
}

#sidebar.open{
  left:0;
}

#toggleBtn{
  position:fixed;
  top:10px;
  left:10px;
  z-index:1100;
  background:#2c7be5;
  color:white;
  border:none;
  padding:10px 14px;
  cursor:pointer;
  border-radius:4px;
  font-size:16px;
}

.location{
  padding:12px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.location:hover{
  background:#eaeaea;
}

.buttons a{
  display:inline-block;
  margin-top:5px;
  margin-right:5px;
  padding:8px 12px;
  background:#2c7be5;
  color:white;
  text-decoration:none;
  border-radius:4px;
  font-size:14px;
}

/* Map */
#map{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  transition:0.3s;
}

#map.shift{
  left:300px; /* sidebar açıkken kaydır */
  width:calc(100% - 300px);
}

/* Mobil uyumlu */
@media screen and (max-width:768px){
  #sidebar{
    width:250px;
  }

  #map.shift{
    left:250px;
    width:calc(100% - 250px);
  }
}
</style>

</head>

<body>

<button id="toggleBtn">☰ Konumlar</button>
<div id="sidebar">
<h3>Konumlar</h3>
<div id="locationList"></div>
</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([37.06,37.38],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// Sidebar toggle
var toggleBtn = document.getElementById("toggleBtn");
var sidebar = document.getElementById("sidebar");
var mapDiv = document.getElementById("map");

toggleBtn.onclick = function(){
  sidebar.classList.toggle("open");
  mapDiv.classList.toggle("shift");
};

// KML yükleme
fetch("./konumlar.kml")
.then(res=>res.text())
.then(kmltext=>{
  var parser = new DOMParser();
  var kml = parser.parseFromString(kmltext,"text/xml");
  var geojson = toGeoJSON.kml(kml);

  var listDiv = document.getElementById("locationList");

  L.geoJSON(geojson,{
    onEachFeature:function(feature,layer){
      var coord = feature.geometry.coordinates;
      var lon = coord[0];
      var lat = coord[1];
      var name = feature.properties.name || "Konum";

      var google = "https://www.google.com/maps?q="+lat+","+lon;
      var apple = "https://maps.apple.com/?q="+lat+","+lon;

      layer.bindPopup("<b>"+name+"</b>");
      layer.addTo(map);

      // Listeye ekle
      var item = document.createElement("div");
      item.className="location";
      item.innerHTML = `
        <b>${name}</b>
        <div class="buttons">
          <a href="${google}" target="_blank">Google</a>
          <a href="${apple}" target="_blank">Apple</a>
        </div>
      `;

      item.onclick = function(){
        map.setView([lat,lon],15);
        layer.openPopup();
        sidebar.classList.remove("open");
        mapDiv.classList.remove("shift");
      };

      listDiv.appendChild(item);
    }
  });
});
</script>

</body>
</html>
